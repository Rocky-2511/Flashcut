<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCut | Professional Video Editing</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="main.css">
</head>
<body class="loading">

    <canvas id="webgl-canvas"></canvas>
    <div class="cinematic-vignette"></div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="loader">
        <div class="loader-shutter top-shutter"></div>
        <div class="loader-shutter bottom-shutter"></div>
        
        <div class="loader-content">
            <div class="loader-text-wrapper">
                <div class="loader-logo-container">
                    <img src="flashcut-logo.png" alt="FlashCut Logo" class="loader-logo-img">
                </div>
                <h1 class="fast-type-text" id="brand-text">FLASHCUT</h1>
                <div class="lightning-slash"></div>
            </div>
            <div class="loader-percentage" id="load-percent">00</div>
        </div>
        <div class="screen-flash"></div>
    </div>

    <a href="#home" class="fixed-ghost-logo magnetic-element">
        <img src="flashcut-logo.png" alt="FlashCut">
    </a>

    <main data-barba="wrapper">
        <div data-barba="container" data-barba-namespace="home">
            
            <section class="hero" id="home">
                <div class="hero-content">
                    <a href="#home" class="hero-logo-link magnetic-element">
                        <img src="flashcut-logo.png" alt="FlashCut" class="hero-logo fade-up">
                    </a>
                    <p class="hero-subtext text-reveal"> by Anurag Tiwari</p>
                    <div class="hero-buttons fade-up">
                        <a href="#portfolio" class="btn btn-primary magnetic-btn">View Work</a>
                    </div>
                </div>
                
                <div class="scroll-indicator fade-up">
                    <div class="mouse"></div>
                </div>
            </section>

            
            <section class="showreel" id="showreel">
                <div class="container">
                    <div class="showreel-wrapper magnetic-element">
                        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=1600" alt="Showreel Thumbnail" class="showreel-bg">
                        <div class="play-button-wrapper">
                            <button class="play-btn" data-video="assets/videos/main-showreel.mp4">
                                <div class="play-icon"></div>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="portfolio" id="portfolio">
                <div class="container">
                    <div class="section-header">
                        <h2 class="section-title text-reveal">Selected Works</h2>
                        <div class="portfolio-filters fade-up">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="reels">Reels</button>
                            <button class="filter-btn" data-filter="youtube">YouTube</button>
                            <button class="filter-btn" data-filter="commercial">Commercial</button>
                            <button class="filter-btn" data-filter="cinematic">Cinematic</button>
                        </div>
                    </div>

                    <div class="portfolio-grid" id="dynamic-portfolio">
                        </div>
                </div>
            </section>

         

            <section class="contact" id="contact">
                <div class="container split-layout">
                    <div class="contact-left">
                        <h2 class="section-title text-reveal">Let's craft <br>something <span class="glow-text">iconic.</span></h2>
                        <p class="section-desc fade-up">Currently accepting premium bookings for Q2 2026.</p>
                    </div>
                    <div class="contact-right fade-up">
                        <form class="contact-form">
                            <div class="input-group">
                                <input type="text" id="name" required placeholder=" ">
                                <label for="name">Your Name</label>
                                <div class="input-line"></div>
                            </div>
                            <div class="input-group">
                                <input type="email" id="email" required placeholder=" ">
                                <label for="email">Email Address</label>
                                <div class="input-line"></div>
                            </div>
                            <div class="input-group">
                                <select id="type" required>
                                    <option value="" disabled selected>Project Scope</option>
                                    <option value="youtube">YouTube</option>
                                    <option value="commercial">Commercial</option>
                                    <option value="reels">Short Form</option>
                                    <option value="other">Other</option>
                                </select>
                                <div class="input-line"></div>
                            </div>
                            <div class="input-group">
                                <textarea id="message" rows="3" required placeholder=" "></textarea>
                                <label for="message">Details</label>
                                <div class="input-line"></div>
                            </div>
                            <button type="submit" class="btn btn-primary magnetic-btn submit-btn">Submit Inquiry</button>
                        </form>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <a href="#home" class="magnetic-element" style="display: inline-block;">
                    <img src="flashcut-logo.png" alt="FlashCut Logo" style="height: 30px; margin-bottom: 10px;">
                </a>
                <p>© 2026 Anurag Tiwari All Rights Reserved </p>
            </div>
            <div class="footer-links">
                <a href="mailto:hello@flashcut.studio" class="magnetic-link">hello@flashcut.studio</a>
            </div>
            <div class="footer-socials">
                <a href="#" class="magnetic-link">Instagram</a>
                <a href="#" class="magnetic-link">Twitter</a>
                <a href="#" class="magnetic-link">LinkedIn</a>
            </div>
        </div>
    </footer>

    <div class="cinematic-video-modal" id="videoModal">
        <div class="modal-backdrop"></div>
        <button class="modal-close-btn magnetic-element">Close</button>
        <div class="modal-video-container" id="modalVideoContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="script.js"></script>
</body>
</html>
